<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Timetable</title>
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Revision">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ea;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --blue:#185FA5;--blue-bg:#ddeeff;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f5f5f7;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
  --blue:#5b9fd4;--blue-bg:#1a2e42;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:600}
header span{font-size:12px;color:var(--text3)}
.main{padding:16px;max-width:1100px;margin:0 auto}

.topgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:640px){.topgrid{grid-template-columns:1fr}}
.panel{background:var(--bg2);border-radius:var(--r);padding:14px}
.panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.panel-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.add-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.add-btn:hover{background:var(--bg3)}

.sub-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.sub-row:last-child{border-bottom:none}
.sub-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.sub-dot:hover{opacity:.8}
.sub-name-input{flex:1;background:transparent;border:none;font-size:13px;color:var(--text);font-family:inherit;padding:0;outline:none}
.sub-name-input:focus{background:var(--bg3);border-radius:4px;padding:1px 4px}
.sub-time{font-size:11px;color:var(--text3);min-width:36px;text-align:right}
.sub-del{font-size:14px;color:var(--text3);cursor:pointer;padding:0 2px;opacity:0;background:none;border:none;line-height:1}
.sub-row:hover .sub-del{opacity:1}
.sub-del:hover{color:#e24b4a}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat{background:var(--bg2);border-radius:var(--rs);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.hint{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.7}

.week-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wbtn{font-size:14px;padding:5px 13px;border-radius:var(--rs);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer}
.wbtn:hover{background:var(--bg3)}
.wbtn:disabled{opacity:.3;cursor:default}
.wlbl{font-size:13px;font-weight:500;flex:1}

.legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:500px;font-size:11px}
th{font-size:11px;font-weight:500;color:var(--text2);padding:5px 3px;text-align:center;border-bottom:0.5px solid var(--border)}
th.tc{width:50px;text-align:left;font-size:10px}
td{padding:2px;vertical-align:top}
.tcell{font-size:10px;color:var(--text3);padding:5px 3px;white-space:nowrap;background:var(--bg2);border-right:0.5px solid var(--border)}
.slot{border-radius:5px;padding:5px 8px 5px 9px;min-height:54px;cursor:grab;position:relative;border-left:3px solid transparent;display:flex;flex-direction:column;justify-content:center;user-select:none}
.slot:active{cursor:grabbing}
.slot.done{opacity:.38}
.slot.done .sname{text-decoration:line-through}
.slot.dragging{opacity:.25}
.drag-over{outline:2px dashed var(--blue)!important;outline-offset:-2px;border-radius:5px}
.sname{font-size:11px;font-weight:500;line-height:1.3;pointer-events:none}
.sdur{font-size:10px;opacity:.6;margin-top:1px;pointer-events:none}
.dots-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:14px;letter-spacing:1px;color:inherit;opacity:0;background:rgba(0,0,0,0.07);border:none;line-height:1}
.slot:hover .dots-btn{opacity:1}
.done-badge{position:absolute;bottom:4px;right:5px;font-size:10px;pointer-events:none}
.break-bar{border-radius:5px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);background:var(--bg2)}
.lunch-bar{border-radius:5px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:var(--blue-bg);color:var(--blue)}

.menu{position:absolute;z-index:200;min-width:170px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rs);overflow:hidden}
.mi{padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:9px}
.mi:hover{background:var(--bg2)}
.msep{height:0.5px;background:var(--border);margin:2px 0}

.overlay{position:absolute;top:0;left:0;width:100%;background:rgba(0,0,0,0.45);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:300}
.modal{background:var(--bg);border-radius:var(--r);padding:18px;width:290px;border:0.5px solid var(--border2)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.sub-picker{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.sp{border-radius:5px;padding:7px 9px;font-size:12px;font-weight:500;cursor:pointer;border-left:3px solid transparent}
.sp:hover{opacity:.8}
.sp.sel{outline:2px solid var(--text);outline-offset:1px}
.swatches{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.sw.sel{border-color:var(--text)}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtns button{padding:6px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.mbtns .save{background:var(--blue);color:#fff;border-color:transparent}
</style>
</head>
<body>
<header><h1>GCSE Revision</h1><span id="hdr-wk"></span></header>
<div class="main" id="root">

<div class="topgrid">
  <div class="panel">
    <div class="panel-hd">
      <span class="panel-title">Subjects</span>
      <button class="add-btn" onclick="addSub()">+ Add subject</button>
    </div>
    <div id="sub-list"></div>
  </div>
  <div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-n" id="st1">0</div><div class="stat-l">sessions done</div></div>
      <div class="stat"><div class="stat-n" id="st2">0h</div><div class="stat-l">time completed</div></div>
    </div>
    <div class="panel" style="padding:10px 12px">
      <div class="panel-title" style="margin-bottom:8px">Time per subject this week</div>
      <div id="time-breakdown"></div>
    </div>
  </div>
</div>

<div class="week-row">
  <button class="wbtn" id="pb" onclick="chWk(-1)">&#8592;</button>
  <span class="wlbl" id="wlbl"></span>
  <button class="wbtn" id="nb" onclick="chWk(1)">&#8594;</button>
</div>
<div class="legend" id="leg"></div>
<div class="tt-wrap"><table id="tt"></table></div>
</div>

<script>
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WK_STARTS=['31 Mar','7 Apr','14 Apr','21 Apr','28 Apr','5 May','12 May','19 May'];
const ROWS=[
  {t:'9:00', tp:'s'},{t:'10:00',tp:'b',tag:'15 min break'},
  {t:'10:15',tp:'s'},{t:'11:15',tp:'b',tag:'15 min break'},
  {t:'11:30',tp:'s'},{t:'12:30',tp:'l',tag:'Lunch — 2 hours'},
  {t:'2:30', tp:'s'},{t:'3:30', tp:'b',tag:'15 min break'},
  {t:'3:45', tp:'s'},{t:'4:45', tp:'b',tag:'15 min break'},
  {t:'5:00', tp:'s'},
];
const SROWS=ROWS.map((_,i)=>i).filter(i=>ROWS[i].tp==='s');

const PALS=[
  {c:'#185FA5',bg:'#ddeeff',dk:'#0C447C'},
  {c:'#3B6D11',bg:'#e5f5d5',dk:'#27500A'},
  {c:'#993C56',bg:'#fce8ef',dk:'#72243E'},
  {c:'#533AB7',bg:'#eeedfe',dk:'#3C3489'},
  {c:'#BA7517',bg:'#fdf0d5',dk:'#633806'},
  {c:'#1D7AA0',bg:'#dcf2fa',dk:'#0a4a63'},
  {c:'#1D9E75',bg:'#ddf5ec',dk:'#085041'},
  {c:'#D85A30',bg:'#fdeee8',dk:'#712B13'},
  {c:'#7B4EA0',bg:'#f3eaff',dk:'#4a2d6b'},
  {c:'#666',   bg:'#f0f0f2',dk:'#333'},
];

const DEF_SUBS=[
  {name:'Maths',pi:0},{name:'Comp Sci',pi:1},{name:'Eng Lang',pi:2},
  {name:'Eng Lit',pi:3},{name:'Chemistry',pi:4},{name:'Physics',pi:5},
  {name:'Biology',pi:6},{name:'History',pi:7},{name:'Music',pi:8},{name:'Drama',pi:9},
];

let S;
try{S=JSON.parse(localStorage.getItem('gcse4'))||{};}catch{S={};}
if(!S.subs)S.subs=DEF_SUBS.map(s=>({...s}));
if(!S.tt)S.tt={};
if(S.wk===undefined)S.wk=0;
const save=()=>{try{localStorage.setItem('gcse4',JSON.stringify(S));}catch{}};

const pal=s=>PALS[s.pi]||PALS[0];
const subByName=n=>S.subs.find(s=>s.name===n);

function shuffle(arr,seed){
  const a=[...arr];let s=seed>>>0;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)>>>0;[a[i],a[s%(i+1)]]=[a[s%(i+1)],a[i]];}
  return a;
}

function buildWk(wk){
  const plan={};
  DAYS.forEach((day,di)=>{
    plan[day]={};
    const q=[];
    S.subs.forEach(s=>{for(let i=0;i<2;i++)q.push(s.name);});
    const sh=shuffle(q,(wk*7+di)*31);
    SROWS.forEach((ri,si)=>{plan[day][ri]={sub:sh[si%sh.length],done:false};});
  });
  return plan;
}

function getPlan(){if(!S.tt[S.wk])S.tt[S.wk]=buildWk(S.wk);return S.tt[S.wk];}
function rebuildWk(){S.tt[S.wk]=buildWk(S.wk);save();renderTable();updateStats();}

let menuEl=null,modalEl=null,dragSrc=null;
const closeMenu=()=>{if(menuEl){menuEl.remove();menuEl=null;}};
const closeModal=()=>{if(modalEl){modalEl.remove();modalEl=null;}};

function renderSubList(){
  const el=document.getElementById('sub-list');
  el.innerHTML='';
  S.subs.forEach((s,i)=>{
    const p=pal(s);
    const row=document.createElement('div');
    row.className='sub-row';
    row.innerHTML=`
      <div class="sub-dot" style="background:${p.c}" title="Change colour" onclick="openDotColor(${i})"></div>
      <input class="sub-name-input" value="${s.name}" onblur="renameSub(${i},this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      <span class="sub-time" id="subtime-${i}">0h</span>
      <button class="sub-del" title="Remove" onclick="delSub(${i})">×</button>`;
    el.appendChild(row);
  });
}

function addSub(){
  const pi=S.subs.length%PALS.length;
  S.subs.push({name:'New subject',pi});
  save();renderSubList();renderLegend();rebuildWk();
  const inputs=document.querySelectorAll('.sub-name-input');
  const last=inputs[inputs.length-1];
  if(last){last.focus();last.select();}
}

function delSub(i){
  if(S.subs.length<=1)return;
  S.subs.splice(i,1);
  save();renderSubList();renderLegend();rebuildWk();
}

function renameSub(i,val){
  const clean=val.trim();
  if(!clean){renderSubList();return;}
  const oldName=S.subs[i].name;
  S.subs[i].name=clean;
  Object.keys(S.tt).forEach(wk=>{
    const plan=S.tt[wk];
    DAYS.forEach(day=>SROWS.forEach(ri=>{if(plan[day]&&plan[day][ri]&&plan[day][ri].sub===oldName)plan[day][ri].sub=clean;}));
  });
  save();renderSubList();renderLegend();renderTable();updateStats();
}

function openDotColor(i){
  closeMenu();closeModal();
  const s=S.subs[i];
  const root=document.getElementById('root');
  modalEl=document.createElement('div');
  modalEl.className='overlay';
  modalEl.style.minHeight=root.scrollHeight+'px';
  const swatches=PALS.map((p,pi)=>`<div class="sw${s.pi===pi?' sel':''}" style="background:${p.c}" onclick="pickDotColor(${i},${pi},this)"></div>`).join('');
  modalEl.innerHTML=`<div class="modal"><h3>Change colour</h3><div class="modal-sub">Applies to all "${s.name}" slots</div><div class="swatches">${swatches}</div><div class="mbtns"><button onclick="closeModal()">Cancel</button><button class="save" onclick="applyDotColor(${i})">Save</button></div></div>`;
  root.appendChild(modalEl);
  modalEl.onclick=e=>{if(e.target===modalEl)closeModal();};
  window._dc={i,pi:s.pi};
}

function pickDotColor(i,pi,el){
  document.querySelectorAll('.sw').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  window._dc={i,pi};
}

function applyDotColor(i){
  if(window._dc){S.subs[window._dc.i].pi=window._dc.pi;}
  save();renderSubList();renderLegend();renderTable();closeModal();
}

function openMenu(day,row,btn){
  closeMenu();closeModal();
  const plan=getPlan();
  const cell=plan[day][row];
  const rect=btn.getBoundingClientRect();
  const root=document.getElementById('root');
  const rr=root.getBoundingClientRect();
  menuEl=document.createElement('div');
  menuEl.className='menu';
  menuEl.style.cssText=`top:${rect.bottom-rr.top+4}px;left:${Math.min(rect.left-rr.left,rr.width-180)}px`;
  const done=cell.done;
  const items=[
    {ic:'✎',lb:'Change subject',fn:()=>{closeMenu();openSubModal(day,row);}},
    {ic:'🎨',lb:'Change colour',fn:()=>{closeMenu();openSlotColor(day,row);}},
    {sep:true},
    {ic:done?'↩':'✓',lb:done?'Mark not done':'Mark as done',fn:()=>{toggleDone(day,row);closeMenu();}},
  ];
  items.forEach(it=>{
    if(it.sep){const d=document.createElement('div');d.className='msep';menuEl.appendChild(d);return;}
    const el=document.createElement('div');
    el.className='mi';
    el.innerHTML=`<span style="font-size:14px;width:18px;text-align:center">${it.ic}</span><span>${it.lb}</span>`;
    el.onclick=it.fn;
    menuEl.appendChild(el);
  });
  root.appendChild(menuEl);
  setTimeout(()=>document.addEventListener('click',outsideClick),0);
}

function outsideClick(e){if(menuEl&&!menuEl.contains(e.target)){closeMenu();document.removeEventListener('click',outsideClick);}}

function openSubModal(day,row){
  closeModal();
  const plan=getPlan();
  const cur=plan[day][row].sub;
  window._se={day,row,sub:cur};
  const root=document.getElementById('root');
  modalEl=document.createElement('div');
  modalEl.className='overlay';
  modalEl.style.minHeight=root.scrollHeight+'px';
  const pills=S.subs.map(s=>{const p=pal(s);return `<div class="sp${s.name===cur?' sel':''}" style="background:${p.bg};border-left-color:${p.c};color:${p.dk}" onclick="pickSub('${s.name}',this)">${s.name}</div>`;}).join('');
  modalEl.innerHTML=`<div class="modal"><h3>Change subject</h3><div class="modal-sub">${day} · ${ROWS[row].t}</div><div class="sub-picker">${pills}</div><div class="mbtns"><button onclick="closeModal()">Cancel</button><button class="save" onclick="applySubEdit()">Save</button></div></div>`;
  root.appendChild(modalEl);
  modalEl.onclick=e=>{if(e.target===modalEl)closeModal();};
}

function pickSub(name,el){
  document.querySelectorAll('.sp').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  window._se.sub=name;
}

function applySubEdit(){
  const{day,row,sub}=window._se||{};
  if(!day||!sub)return;
  getPlan()[day][row].sub=sub;
  save();renderTable();updateStats();closeModal();
}

function openSlotColor(day,row){
  closeModal();
  const plan=getPlan();
  const subName=plan[day][row].sub;
  const s=subByName(subName);
  if(!s)return;
  const idx=S.subs.indexOf(s);
  window._sc={idx,pi:s.pi};
  const root=document.getElementById('root');
  modalEl=document.createElement('div');
  modalEl.className='overlay';
  modalEl.style.minHeight=root.scrollHeight+'px';
  const swatches=PALS.map((p,pi)=>`<div class="sw${s.pi===pi?' sel':''}" style="background:${p.c}" onclick="pickSlotColor(${pi},this)"></div>`).join('');
  modalEl.innerHTML=`<div class="modal"><h3>Change colour</h3><div class="modal-sub">Applies to all "${subName}" slots</div><div class="swatches">${swatches}</div><div class="mbtns"><button onclick="closeModal()">Cancel</button><button class="save" onclick="applySlotColor()">Save</button></div></div>`;
  root.appendChild(modalEl);
  modalEl.onclick=e=>{if(e.target===modalEl)closeModal();};
}

function pickSlotColor(pi,el){
  document.querySelectorAll('.sw').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  window._sc.pi=pi;
}

function applySlotColor(){
  const{idx,pi}=window._sc||{};
  if(idx===undefined)return;
  S.subs[idx].pi=pi;
  save();renderSubList();renderLegend();renderTable();closeModal();
}

function toggleDone(day,row){
  const plan=getPlan();
  plan[day][row].done=!plan[day][row].done;
  save();renderTable();updateStats();
}

function renderLegend(){
  document.getElementById('leg').innerHTML=S.subs.map(s=>`<span class="leg"><span class="leg-dot" style="background:${pal(s).c}"></span>${s.name}</span>`).join('');
}

function renderTable(){
  closeMenu();
  const plan=getPlan();
  let h=`<thead><tr><th class="tc">Time</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
  ROWS.forEach((row,ri)=>{
    if(row.tp==='b'){
      h+=`<tr><td class="tcell" style="font-size:9px">${row.t}</td><td colspan="7"><div class="break-bar">${row.tag}</div></td></tr>`;
    } else if(row.tp==='l'){
      h+=`<tr><td class="tcell" style="font-size:9px">${row.t}</td><td colspan="7"><div class="lunch-bar">${row.tag}</div></td></tr>`;
    } else {
      h+=`<tr><td class="tcell">${row.t}</td>`;
      DAYS.forEach(day=>{
        const cell=plan[day]&&plan[day][ri];
        if(!cell){h+=`<td></td>`;return;}
        const{sub,done}=cell;
        const s=subByName(sub)||{name:sub,pi:0};
        const p=pal(s);
        h+=`<td><div class="slot${done?' done':''}" draggable="true" style="background:${p.bg};border-left-color:${p.c}" data-day="${day}" data-row="${ri}" ondragstart="dS(event)" ondragend="dE(event)" ondragover="dO(event)" ondrop="dP(event)">
          <span class="sname" style="color:${p.dk}">${sub}</span>
          <span class="sdur" style="color:${p.dk}">1 hour</span>
          ${done?`<span class="done-badge" style="color:${p.c}">✓</span>`:''}
          <button class="dots-btn" style="color:${p.dk}" onclick="openMenu('${day}',${ri},this);event.stopPropagation()">···</button>
        </div></td>`;
      });
      h+='</tr>';
    }
  });
  h+='</tbody>';
  document.getElementById('tt').innerHTML=h;
}

function updateStats(){
  const plan=getPlan();
  let done=0,tot=0;
  const subHrs={};
  S.subs.forEach(s=>subHrs[s.name]=0);
  DAYS.forEach(day=>SROWS.forEach(ri=>{
    const cell=plan[day]&&plan[day][ri];
    if(!cell)return;
    tot++;
    if(cell.done){done++;if(subHrs[cell.sub]!==undefined)subHrs[cell.sub]++;}
  }));
  document.getElementById('st1').textContent=done;
  document.getElementById('st2').textContent=done+'h';

  const bd=document.getElementById('time-breakdown');
  bd.innerHTML=S.subs.map((s,i)=>{
    const hrs=subHrs[s.name]||0;
    const p=pal(s);
    const pct=done?Math.round((hrs/done)*100):0;
    document.getElementById('subtime-'+i)&&(document.getElementById('subtime-'+i).textContent=hrs+'h');
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:11px;color:var(--text2);width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${s.name}</span>
      <div style="flex:1;height:5px;background:var(--border);border-radius:3px"><div style="height:100%;width:${pct}%;background:${p.c};border-radius:3px"></div></div>
      <span style="font-size:11px;color:var(--text3);width:24px;text-align:right">${hrs}h</span>
    </div>`;
  }).join('');

  S.subs.forEach((s,i)=>{
    const el=document.getElementById('subtime-'+i);
    if(el)el.textContent=(subHrs[s.name]||0)+'h';
  });
}

function chWk(d){
  S.wk=Math.max(0,Math.min(7,S.wk+d));
  save();
  document.getElementById('wlbl').textContent=`Week ${S.wk+1} — ${WK_STARTS[S.wk]}`;
  document.getElementById('hdr-wk').textContent=WK_STARTS[S.wk];
  document.getElementById('pb').disabled=S.wk===0;
  document.getElementById('nb').disabled=S.wk===7;
  renderTable();updateStats();
}

function dS(e){dragSrc=e.currentTarget;dragSrc.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dE(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}
function dO(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dP(e){
  e.stopPropagation();e.preventDefault();
  const t=e.currentTarget;t.classList.remove('drag-over');
  if(!dragSrc||dragSrc===t)return;
  const plan=getPlan();
  const sd=dragSrc.dataset.day,sr=parseInt(dragSrc.dataset.row);
  const td=t.dataset.day,tr=parseInt(t.dataset.row);
  const tmp=plan[sd][sr];plan[sd][sr]=plan[td][tr];plan[td][tr]=tmp;
  save();renderTable();updateStats();
}

document.getElementById('wlbl').textContent=`Week ${S.wk+1} — ${WK_STARTS[S.wk]}`;
document.getElementById('hdr-wk').textContent=WK_STARTS[S.wk];
document.getElementById('pb').disabled=S.wk===0;
document.getElementById('nb').disabled=S.wk===7;
renderSubList();renderLegend();renderTable();updateStats();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
