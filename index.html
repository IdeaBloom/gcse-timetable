<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Timetable</title>
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Revision">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ea;--text:#1a1a1a;--text2:#555;--text3:#999;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--blue:#185FA5;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f5f5f7;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:13px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600}
header span{font-size:12px;color:var(--text3)}
.main{padding:14px;max-width:1100px;margin:0 auto}
.topgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:580px){.topgrid{grid-template-columns:1fr}}
.card{background:var(--bg2);border-radius:var(--r);padding:13px}
.card-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

/* subject editor */
.sub-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dot-btn{width:18px;height:18px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0}
.sub-input{flex:1;background:transparent;border:none;font-size:13px;color:var(--text);font-family:inherit;outline:none;border-bottom:0.5px solid transparent;padding:1px 0}
.sub-input:focus{border-bottom-color:var(--border2)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;padding:2px 4px}
.del-btn:hover{color:#e24b4a}
.add-sub-btn{background:none;border:0.5px dashed var(--border2);border-radius:var(--rs);padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;width:100%;margin-top:4px;text-align:left}
.add-sub-btn:hover{background:var(--bg3)}

/* stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:1px}
.sub-times{max-height:140px;overflow-y:auto}
.st-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.st-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-name{font-size:12px;color:var(--text);flex:1}
.st-time{font-size:12px;color:var(--text2);font-weight:500}

/* week nav */
.week-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wbtn{font-size:13px;padding:5px 12px;border-radius:var(--rs);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer}
.wbtn:hover{background:var(--bg3)}
.wbtn:disabled{opacity:.3;cursor:default}
.wlbl{font-size:13px;font-weight:500;flex:1}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* table */
.tt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:500px;font-size:11px}
th{font-size:11px;font-weight:500;color:var(--text2);padding:5px 3px;text-align:center;border-bottom:0.5px solid var(--border)}
th.tc{width:50px;text-align:left;font-size:10px}
td{padding:2px;vertical-align:top}
.tcell{font-size:10px;color:var(--text3);padding:5px 3px;white-space:nowrap;background:var(--bg2);border-right:0.5px solid var(--border)}
.slot{border-radius:5px;padding:5px 7px 5px 9px;min-height:54px;cursor:grab;position:relative;border-left:3px solid transparent;display:flex;flex-direction:column;justify-content:center}
.slot:active{cursor:grabbing}
.slot.done{opacity:.38}
.slot.done .sname{text-decoration:line-through}
.slot.dragging{opacity:.25}
.drag-over{outline:2px dashed var(--blue)!important;outline-offset:-2px;border-radius:5px}
.sname{font-size:11px;font-weight:500;line-height:1.3;pointer-events:none}
.sdur{font-size:10px;opacity:.6;margin-top:1px;pointer-events:none}
.dots-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:13px;color:inherit;opacity:0;transition:opacity .1s;background:rgba(0,0,0,0.06);border:none;letter-spacing:1px}
.slot:hover .dots-btn{opacity:1}
.tick-badge{position:absolute;bottom:3px;right:4px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;pointer-events:none}
.break-cell{border-radius:5px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);background:var(--bg2)}
.lunch-cell{border-radius:5px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--blue);background:#ddeeff}

/* dropdown menu */
.menu{position:absolute;z-index:200;min-width:165px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rs);overflow:hidden}
.menu-item{padding:9px 13px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:9px}
.menu-item:hover{background:var(--bg2)}
.menu-sep{height:0.5px;background:var(--border);margin:2px 0}

/* modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg);border-radius:var(--r);padding:18px;width:100%;max-width:290px;border:0.5px solid var(--border)}
.modal h3{font-size:14px;font-weight:500;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:13px}
.sub-picker{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.spill{border-radius:5px;padding:7px 9px;font-size:12px;font-weight:500;cursor:pointer;border-left:3px solid transparent}
.spill:hover{filter:brightness(.95)}
.spill.sel{outline:2px solid var(--text);outline-offset:1px}
.cpicker{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cswatch.sel{border-color:var(--text)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:6px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.modal-btns .save{background:var(--blue);color:#fff;border-color:transparent}

/* colour picker popup for subject editor */
.cp-popup{position:absolute;z-index:400;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rs);padding:10px;display:flex;flex-wrap:wrap;gap:6px;width:158px}
</style>
</head>
<body>
<header><h1>GCSE Revision</h1><span id="hwk"></span></header>
<div class="main" id="root">

<div class="topgrid">
  <!-- subjects panel -->
  <div class="card">
    <div class="card-title">Subjects</div>
    <div id="sub-list"></div>
    <button class="add-sub-btn" onclick="addSub()">+ Add subject</button>
  </div>

  <!-- stats panel -->
  <div>
    <div class="stats-grid" style="margin-bottom:10px">
      <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">sessions done</div></div>
      <div class="stat"><div class="stat-n" id="s-time">0h</div><div class="stat-l">time completed</div></div>
    </div>
    <div class="card">
      <div class="card-title">Time per subject (this week)</div>
      <div class="sub-times" id="sub-times"></div>
    </div>
  </div>
</div>

<div class="week-row">
  <button class="wbtn" id="pb" onclick="chWeek(-1)">&#8592;</button>
  <span class="wlbl" id="wlbl"></span>
  <button class="wbtn" id="nb" onclick="chWeek(1)">&#8594;</button>
</div>
<div class="legend" id="leg"></div>
<div class="tt-wrap"><table id="tt"></table></div>
</div>

<script>
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WS=['31 Mar','7 Apr','14 Apr','21 Apr','28 Apr','5 May','12 May','19 May'];
const ROWS=[
  {t:'9:00',type:'s'},{t:'10:00',type:'b',tag:'15 min break'},
  {t:'10:15',type:'s'},{t:'11:15',type:'b',tag:'15 min break'},
  {t:'11:30',type:'s'},{t:'12:30',type:'l',tag:'Lunch — 2 hours'},
  {t:'2:30',type:'s'},{t:'3:30',type:'b',tag:'15 min break'},
  {t:'3:45',type:'s'},{t:'4:45',type:'b',tag:'15 min break'},
  {t:'5:00',type:'s'},
];
const SR=ROWS.map((_,i)=>i).filter(i=>ROWS[i].type==='s');

const PALS=[
  {c:'#185FA5',l:'#ddeeff',d:'#0C447C'},
  {c:'#3B6D11',l:'#e5f5d5',d:'#27500A'},
  {c:'#993C56',l:'#fce8ef',d:'#72243E'},
  {c:'#533AB7',l:'#eeedfe',d:'#3C3489'},
  {c:'#BA7517',l:'#fdf0d5',d:'#633806'},
  {c:'#1D7AA0',l:'#dcf2fa',d:'#0a4a63'},
  {c:'#1D9E75',l:'#ddf5ec',d:'#085041'},
  {c:'#D85A30',l:'#fdeee8',d:'#712B13'},
  {c:'#7B4EA0',l:'#f3eaff',d:'#4a2d6b'},
  {c:'#888',   l:'#f0f0f2',d:'#444'},
];

const DEF_SUBS=[
  {name:'Maths',pi:0},{name:'Comp Sci',pi:1},{name:'Eng Lang',pi:2},
  {name:'Eng Lit',pi:3},{name:'Chemistry',pi:4},{name:'Physics',pi:5},
  {name:'Biology',pi:6},{name:'History',pi:7},{name:'Music',pi:8},{name:'Drama',pi:9},
];

let S;
try{S=JSON.parse(localStorage.getItem('gcse4'))||{};}catch{S={};}
if(!S.subs)S.subs=DEF_SUBS.map(s=>({...s}));
if(!S.tt)S.tt={};
if(S.wk===undefined)S.wk=0;

const save=()=>{try{localStorage.setItem('gcse4',JSON.stringify(S));}catch{}};
const pal=s=>PALS[s.pi]||PALS[0];
const getPal=name=>{const s=S.subs.find(x=>x.name===name);return s?pal(s):PALS[0];};

function shuffle(arr,seed){
  const a=[...arr];let s=seed>>>0;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)>>>0;[a[i],a[s%(i+1)]]=[a[s%(i+1)],a[i]];}
  return a;
}

function buildWeek(wk){
  const plan={};
  DAYS.forEach((day,di)=>{
    plan[day]={};
    const q=[];
    S.subs.forEach(s=>{for(let i=0;i<3;i++)q.push(s.name);});
    const sh=shuffle(q,(wk*7+di)*31);
    SR.forEach((ri,si)=>{plan[day][ri]={sub:sh[si%sh.length],done:false};});
  });
  return plan;
}

function getPlan(){
  if(!S.tt[S.wk])S.tt[S.wk]=buildWeek(S.wk);
  return S.tt[S.wk];
}

function rebuildWk(){S.tt[S.wk]=buildWeek(S.wk);save();renderTable();updateStats();}

// ---- subject editor ----
let cpPopup=null;
function closeCp(){if(cpPopup){cpPopup.remove();cpPopup=null;}}

function renderSubList(){
  const el=document.getElementById('sub-list');
  el.innerHTML='';
  S.subs.forEach((s,i)=>{
    const p=pal(s);
    const row=document.createElement('div');
    row.className='sub-row';
    row.innerHTML=`
      <button class="dot-btn" style="background:${p.c}" title="Change colour" onclick="openCpPopup(${i},this)"></button>
      <input class="sub-input" value="${s.name}" onchange="renameSub(${i},this.value)" onblur="renameSub(${i},this.value)">
      <button class="del-btn" onclick="delSub(${i})" title="Remove">&#215;</button>`;
    el.appendChild(row);
  });
}

function openCpPopup(idx,btn){
  closeCp();
  cpPopup=document.createElement('div');
  cpPopup.className='cp-popup';
  PALS.forEach((p,pi)=>{
    const sw=document.createElement('div');
    sw.className='cswatch'+(S.subs[idx].pi===pi?' sel':'');
    sw.style.background=p.c;
    sw.onclick=()=>{S.subs[idx].pi=pi;save();closeCp();renderSubList();renderLegend();renderTable();};
    cpPopup.appendChild(sw);
  });
  const rect=btn.getBoundingClientRect();
  const root=document.getElementById('root');
  const rr=root.getBoundingClientRect();
  cpPopup.style.cssText=`top:${rect.bottom-rr.top+4}px;left:${rect.left-rr.left}px`;
  root.appendChild(cpPopup);
  setTimeout(()=>document.addEventListener('click',closeCpOut),0);
}
function closeCpOut(e){if(cpPopup&&!cpPopup.contains(e.target)){closeCp();document.removeEventListener('click',closeCpOut);}}

function renameSub(idx,val){
  val=val.trim();
  if(!val||val===S.subs[idx].name)return;
  const old=S.subs[idx].name;
  S.subs[idx].name=val;
  // update timetable cells
  Object.values(S.tt).forEach(plan=>{
    Object.values(plan).forEach(day=>{
      Object.values(day).forEach(cell=>{if(cell.sub===old)cell.sub=val;});
    });
  });
  save();renderSubList();renderLegend();renderTable();updateStats();
}

function delSub(idx){
  if(S.subs.length<=1)return;
  const name=S.subs[idx].name;
  S.subs.splice(idx,1);
  // replace deleted sub in timetable with first remaining sub
  const fallback=S.subs[0].name;
  Object.values(S.tt).forEach(plan=>{
    Object.values(plan).forEach(day=>{
      Object.values(day).forEach(cell=>{if(cell.sub===name)cell.sub=fallback;});
    });
  });
  save();renderSubList();renderLegend();renderTable();updateStats();
}

function addSub(){
  const existing=new Set(S.subs.map(s=>s.name));
  const usedPi=new Set(S.subs.map(s=>s.pi));
  const pi=PALS.findIndex((_,i)=>!usedPi.has(i));
  let name='New subject';let n=2;
  while(existing.has(name))name=`New subject ${n++}`;
  S.subs.push({name,pi:pi>=0?pi:0});
  save();renderSubList();renderLegend();
}

// ---- stats ----
function updateStats(){
  const plan=getPlan();let tot=0,done=0;
  const times={};S.subs.forEach(s=>times[s.name]=0);
  DAYS.forEach(day=>SR.forEach(ri=>{
    const c=plan[day][ri];if(!c)return;
    tot++;
    if(!times[c.sub])times[c.sub]=0;
    if(c.done){done++;times[c.sub]+=1;}
  }));
  document.getElementById('s-done').textContent=done;
  const hrs=(done*1);
  document.getElementById('s-time').textContent=hrs<1?`${done*60}m`:`${hrs}h`;
  const el=document.getElementById('sub-times');
  el.innerHTML=S.subs.map(s=>{
    const p=pal(s);const t=times[s.name]||0;
    return `<div class="st-row">
      <span class="st-dot" style="background:${p.c}"></span>
      <span class="st-name">${s.name}</span>
      <span class="st-time">${t>0?t+'h done':'—'}</span>
    </div>`;
  }).join('');
}

// ---- legend ----
function renderLegend(){
  document.getElementById('leg').innerHTML=S.subs.map(s=>`
    <span class="leg"><span class="leg-dot" style="background:${pal(s).c}"></span>${s.name}</span>`).join('');
}

// ---- table ----
let menuEl=null;
let overlayEl=null;
function closeMenu(){if(menuEl){menuEl.remove();menuEl=null;}}
function closeOverlay(){if(overlayEl){overlayEl.remove();overlayEl=null;}}

function renderTable(){
  closeMenu();
  const plan=getPlan();
  const tt=document.getElementById('tt');
  let h=`<thead><tr><th class="tc">Time</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
  ROWS.forEach((row,ri)=>{
    if(row.type==='b'){
      h+=`<tr><td class="tcell" style="font-size:9px">${row.t}</td><td colspan="7"><div class="break-cell">${row.tag}</div></td></tr>`;
    } else if(row.type==='l'){
      h+=`<tr><td class="tcell" style="font-size:9px">${row.t}</td><td colspan="7"><div class="lunch-cell">${row.tag}</div></td></tr>`;
    } else {
      h+=`<tr><td class="tcell">${row.t}</td>`;
      DAYS.forEach(day=>{
        const cell=plan[day][ri];if(!cell){h+=`<td></td>`;return;}
        const {sub,done}=cell;
        const p=getPal(sub);
        h+=`<td><div class="slot${done?' done':''}" draggable="true"
          style="background:${p.l};border-left-color:${p.c}"
          data-day="${day}" data-row="${ri}"
          ondragstart="dS(event)" ondragend="dE(event)" ondragover="dO(event)" ondrop="dP(event)">
          <span class="sname" style="color:${p.d}">${sub}</span>
          <span class="sdur" style="color:${p.d}">1 hour</span>
          ${done?`<span class="tick-badge" style="background:${p.c};color:${p.l}">✓</span>`:''}
          <button class="dots-btn" style="color:${p.d}" onclick="openMenu('${day}',${ri},this);event.stopPropagation()">···</button>
        </div></td>`;
      });
      h+='</tr>';
    }
  });
  h+='</tbody>';
  tt.innerHTML=h;
}

function openMenu(day,row,btn){
  closeMenu();closeOverlay();
  const plan=getPlan();
  const cell=plan[day][row];
  const rect=btn.getBoundingClientRect();
  const root=document.getElementById('root');
  const rr=root.getBoundingClientRect();
  const top=rect.bottom-rr.top+4;
  const left=Math.min(rect.left-rr.left,rr.width-175);
  menuEl=document.createElement('div');
  menuEl.className='menu';
  menuEl.style.cssText=`top:${top}px;left:${left}px`;
  const items=[
    {icon:'✎',label:'Change subject',fn:()=>{closeMenu();openSubModal(day,row);}},
    {sep:true},
    {icon:cell.done?'↩':'✓',label:cell.done?'Mark not done':'Mark as done',fn:()=>{toggleDone(day,row);closeMenu();}},
  ];
  items.forEach(item=>{
    if(item.sep){const d=document.createElement('div');d.className='menu-sep';menuEl.appendChild(d);return;}
    const el=document.createElement('div');el.className='menu-item';
    el.innerHTML=`<span style="width:16px;text-align:center">${item.icon}</span><span>${item.label}</span>`;
    el.onclick=item.fn;menuEl.appendChild(el);
  });
  root.appendChild(menuEl);
  setTimeout(()=>document.addEventListener('click',closeMenuOut),0);
}
function closeMenuOut(e){if(menuEl&&!menuEl.contains(e.target)){closeMenu();document.removeEventListener('click',closeMenuOut);}}

function openSubModal(day,row){
  closeOverlay();
  const plan=getPlan();
  const current=plan[day][row].sub;
  window._pickedSub=current;
  overlayEl=document.createElement('div');
  overlayEl.className='overlay';
  const pills=S.subs.map(s=>{
    const p=pal(s);
    return `<div class="spill${s.name===current?' sel':''}" style="background:${p.l};border-left-color:${p.c};color:${p.d}"
      onclick="pickSub('${s.name}',this)">${s.name}</div>`;
  }).join('');
  overlayEl.innerHTML=`<div class="modal">
    <h3>Change subject</h3>
    <div class="modal-sub">${day} · ${ROWS[row].t}</div>
    <div class="sub-picker">${pills}</div>
    <div class="modal-btns">
      <button onclick="closeOverlay()">Cancel</button>
      <button class="save" onclick="applySubEdit('${day}',${row})">Save</button>
    </div>
  </div>`;
  overlayEl.onclick=e=>{if(e.target===overlayEl)closeOverlay();};
  document.getElementById('root').appendChild(overlayEl);
}

function pickSub(name,el){
  window._pickedSub=name;
  document.querySelectorAll('.spill').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

function applySubEdit(day,row){
  const p=window._pickedSub;if(!p)return;
  getPlan()[day][row].sub=p;
  save();renderTable();updateStats();closeOverlay();
}

function toggleDone(day,row){
  const plan=getPlan();
  plan[day][row].done=!plan[day][row].done;
  save();renderTable();updateStats();
}

// drag
let dragSrc=null;
function dS(e){dragSrc=e.currentTarget;dragSrc.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dE(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}
function dO(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dP(e){
  e.stopPropagation();e.preventDefault();
  const t=e.currentTarget;t.classList.remove('drag-over');
  if(!dragSrc||dragSrc===t)return;
  const plan=getPlan();
  const sd=dragSrc.dataset.day,sr=parseInt(dragSrc.dataset.row);
  const td=t.dataset.day,tr=parseInt(t.dataset.row);
  const tmp=plan[sd][sr];plan[sd][sr]=plan[td][tr];plan[td][tr]=tmp;
  save();renderTable();updateStats();
}

function chWeek(d){
  S.wk=Math.max(0,Math.min(7,S.wk+d));save();
  document.getElementById('wlbl').textContent=`Week ${S.wk+1} — ${WS[S.wk]}`;
  document.getElementById('hwk').textContent=WS[S.wk];
  document.getElementById('pb').disabled=S.wk===0;
  document.getElementById('nb').disabled=S.wk===7;
  renderTable();updateStats();
}

// init
document.getElementById('wlbl').textContent=`Week ${S.wk+1} — ${WS[S.wk]}`;
document.getElementById('hwk').textContent=WS[S.wk];
document.getElementById('pb').disabled=S.wk===0;
document.getElementById('nb').disabled=S.wk===7;
renderSubList();renderLegend();renderTable();updateStats();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
